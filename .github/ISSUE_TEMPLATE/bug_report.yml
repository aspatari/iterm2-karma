name: Bug report
description: A color renders incorrectly, a build step fails, or something else is broken.
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more concrete the report,
        the faster it can be reproduced and fixed.

  - type: input
    id: variant
    attributes:
      label: Affected variant
      description: Which `.itermcolors` file or build step is misbehaving?
      placeholder: "karma-dark.itermcolors / karma-light-hc.itermcolors / `deno task build` / preview pipeline"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: "ANSI 4 (blue) renders as Karma's cyan-blue #5ad4e6 in `ls --color=auto`."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include exact error messages or screenshots.
      placeholder: "ANSI 4 renders as orange instead. Screenshot attached."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps so a maintainer can reproduce locally.
      placeholder: |
        1. Import `colors/karma-dark.itermcolors` in iTerm2.
        2. Open a directory with `ls --color=auto`.
        3. Observe the color of folder names.
      render: markdown
    validations:
      required: true

  - type: input
    id: iterm2_version
    attributes:
      label: iTerm2 version
      description: Find via **iTerm2 → About iTerm2**. Include build number if available.
      placeholder: "3.5.0 (3.5.0.20240101)"

  - type: input
    id: macos_version
    attributes:
      label: macOS version
      placeholder: "macOS 14.5 Sonoma (Apple Silicon)"

  - type: input
    id: deno_version
    attributes:
      label: Deno version (build issues only)
      description: Output of `deno --version`. Skip if the bug is about a `.itermcolors` file.
      placeholder: "deno 2.1.0 (stable, release, aarch64-apple-darwin)"

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else relevant — terminal multiplexer (tmux/screen), shell, conflicting profiles, etc.
