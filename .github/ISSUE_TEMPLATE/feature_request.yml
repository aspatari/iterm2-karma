name: Feature request
description: Suggest a new variant, a build improvement, or another enhancement.
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have a Karma variant in mind that the current six don't cover?
        A build pipeline or distribution improvement? Open it here.

        Before filing, please skim the [README variants table](../../README.md#variants)
        and the [roadmap](../../#roadmap) — the idea may already exist or be planned.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or pain point this would address.
      placeholder: "I want a Karma variant tuned for color-blind users — current accents are hard to distinguish."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should be added or changed? Be concrete — include hex codes for new variants if you have them.
      placeholder: |
        A `karma-dark-deuteranopia` variant that swaps red/green for blue/orange,
        following IBM's color-blind palette. Approximate hex codes: ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
      placeholder: "Filtering existing palettes through a color-vision-deficiency simulator instead of a hand-tuned variant."

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, references to similar themes, links to relevant tools.
