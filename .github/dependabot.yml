# Dependabot keeps GitHub Actions versions current so the CI pipeline
# does not silently slide into deprecated runners (e.g. the Node 16 → 24
# transition that broke actions/checkout@v3 mid-2024).
#
# Scope is intentionally narrow: this project has no JavaScript runtime
# dependencies (Deno + JSR specifiers, no node_modules) and no Docker
# images, so the only ecosystem worth monitoring is github-actions.

version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Chisinau"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    # Group minor + patch bumps for the same action into a single PR to
    # avoid review noise. Major bumps stay separate so deprecation
    # changes get individual attention.
    groups:
      ci-actions-minor:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
